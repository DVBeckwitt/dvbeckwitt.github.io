  about:             |
    David Beckwitt is a Physics Ph.D. candidate at the University of Missouri
    working on quantitative X-ray scattering, detector-space modeling,
    disorder in layered van der Waals thin films, and scientific Python tools.

    His work connects custom diffraction instrumentation, area-detector data,
    thin-film materials characterization, and machine-learning-assisted
    structure analysis.

